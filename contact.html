<body>

            </div>
        </div>
    </nav>
    <main>
      <section class="section">
        <div class="container">
          <h2 class="section-title">Contact Me</h2>
          <div class="form-card card">
            <form id="contact-form" action="https://formspree.io/f/mkoqegnq " method="POST">
              <input type="hidden" name="_subject" value="New contact form submission" />
              <div class="form-group">
                <label for="name">Name</label>
                <input id="name" name="name" type="text" placeholder="Your full name" required />
              </div>

              <div class="form-group">
                <label for="email">Email</label>
                <input id="email" name="_replyto" type="email" placeholder="you@example.com" required />
              </div>

              <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" name="message" rows="6" placeholder="Tell me about your project" required></textarea>
              </div>

              <input type="submit" class="btn" value="Send Message" />
            </form>
            <p class="form-note">All fields are required. Form submissions will be forwarded to jhonlessar@gmail.com once Formspree is configured.</p>
            <p id="statusMessage" class="form-note" aria-live="polite"></p>
          </div>
        </div>
      </section>
    </main>
    <script>
      const form = document.getElementById('contact-form');
      const statusMessage = document.getElementById('statusMessage');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();

        if (!form.checkValidity()) {
          statusMessage.textContent = 'Please complete all required fields before sending.';
          statusMessage.style.color = '#b91c1c';
          return;
        }

        statusMessage.textContent = 'Sending...';
        statusMessage.style.color = '#0f766e';

        const formData = new FormData(form);
        try {
          const response = await fetch(form.action, {
            method: 'POST',
            body: formData,
            headers: { 'Accept': 'application/json' }
          });

          if (response.ok) {
            statusMessage.textContent = 'Message sent! Check your email at jhonlessar@gmail.com for confirmation.';
            statusMessage.style.color = '#16a34a';
            form.reset();
          } else {
            const errorData = await response.json();
            statusMessage.textContent = errorData.error || 'There was an error sending the message. Try again.';
            statusMessage.style.color = '#b91c1c';
          }
        } catch (error) {
          statusMessage.textContent = 'Network error. Please check your internet and try again.';
          statusMessage.style.color = '#b91c1c';
        }
      });
    </script>
